name: upstream-sync

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private fork mirror
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Merge upstream into sync branch
        id: merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/bpatrik/pigallery2.git
          git fetch upstream master --tags
          git fetch origin main

          UPSTREAM_SHA="$(git rev-parse upstream/master)"
          CURRENT_SHA="$(git rev-parse origin/main)"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "${GITHUB_OUTPUT}"
          echo "current_sha=${CURRENT_SHA}" >> "${GITHUB_OUTPUT}"

          if git merge-base --is-ancestor "${UPSTREAM_SHA}" origin/main; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git checkout -B upstream-sync/bpatrik-master origin/main
          if git merge --no-ff upstream/master -m "Merge upstream bpatrik/pigallery2"; then
            if [ "$(git rev-parse HEAD)" = "${CURRENT_SHA}" ]; then
              echo "changed=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            git push --force-with-lease origin upstream-sync/bpatrik-master
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "conflict=false" >> "${GITHUB_OUTPUT}"
          else
            git merge --abort
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "conflict=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Open or update upstream sync PR
        if: steps.merge.outputs.changed == 'true' && steps.merge.outputs.conflict != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY="Automated upstream sync from bpatrik/pigallery2@${{ steps.merge.outputs.upstream_sha }}.

Review carefully before merging because PiGallery2Plus carries local performance, metadata, random-link, audit-log, video-player, and deployment changes."
          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head upstream-sync/bpatrik-master \
            --title "Sync upstream bpatrik/pigallery2" \
            --body "${BODY}" || \
          gh pr edit upstream-sync/bpatrik-master \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Sync upstream bpatrik/pigallery2" \
            --body "${BODY}"

      - name: Report upstream sync conflict
        if: steps.merge.outputs.changed == 'true' && steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TITLE="Upstream sync conflict with bpatrik/pigallery2"
          BODY="Automated upstream sync could not merge bpatrik/pigallery2@${{ steps.merge.outputs.upstream_sha }} into main.

Manual conflict resolution is required. Start locally with:

\`\`\`sh
git fetch origin main
git fetch https://github.com/bpatrik/pigallery2.git master
git checkout -B upstream-sync/manual origin/main
git merge FETCH_HEAD
\`\`\`"
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TITLE}" \
            --body "${BODY}"
